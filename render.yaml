services:
  # Express API + MongoDB — both run inside this single container
  # Free tier: sleeps after 15min inactivity (~30s cold start on first request)
  # Note: MongoDB data is ephemeral — wiped on redeploy/restart
  - type: web
    name: gnito-api
    runtime: docker
    dockerfilePath: ./server/api/Dockerfile
    dockerContext: ./server/api
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: MONGO_URL
        value: mongodb://localhost:27017/gnito

  # Vue frontend — static site, never sleeps, free forever
  - type: web
    name: gnito-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: client/app
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VUE_APP_API_URL
        # Set this to your gnito-api Render URL after first deploy, e.g.:
        # https://gnito-api.onrender.com/api
        sync: false
